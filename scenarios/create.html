<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>시나리오 제작 · LIMBUS</title>
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .mk-wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1.2rem 4rem;}
    .mk-head{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin:1.4rem 0 1.6rem;}
    .mk-title{font-family:var(--font-d);font-size:1.7rem;font-weight:900;letter-spacing:.08em;color:var(--gold-bright);}
    .mk-actions{margin-left:auto;display:flex;gap:.6rem;flex-wrap:wrap;}
    .mk-btn{text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);color:var(--text-dim);font-family:var(--font-ui);font-size:.78rem;padding:.5rem .9rem;cursor:pointer;transition:all var(--t);}
    .mk-btn:hover{border-color:var(--gold-dim);color:var(--gold);}
    .mk-btn.primary{background:var(--gold-bg);border-color:var(--gold-dim);color:var(--gold);}
    .mk-btn.primary:hover{box-shadow:0 0 14px rgba(201,168,76,.3);color:var(--gold-bright);}
    .mk-meta{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--rl);padding:1.2rem;margin-bottom:1.4rem;display:grid;gap:.9rem;}
    .mk-row2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
    .scn-cards{display:flex;flex-direction:column;gap:1rem;}
    .scn-card-edit{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;position:relative;}
    .scn-card-edit::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.5;}
    .scn-card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;}
    .scn-badge{width:1.8rem;height:1.8rem;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);font-family:var(--font-d);font-weight:700;}
    .scn-tools{margin-left:auto;display:flex;gap:.35rem;}
    .scn-tool{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);color:var(--text-dim);font-size:.72rem;padding:.3rem .55rem;cursor:pointer;transition:all var(--t);}
    .scn-tool:hover{border-color:var(--gold-dim);color:var(--gold);}
    .scn-tool.del:hover{border-color:var(--red);color:var(--red-bright);}
    .mk-img-row{display:flex;align-items:center;gap:.7rem;margin-top:.7rem;flex-wrap:wrap;}
    .mk-img-prev{max-height:120px;border-radius:var(--r);border:1px solid var(--border);}
    .mk-add{width:100%;background:var(--bg-input);border:1px dashed var(--border-accent);border-radius:var(--rl);color:var(--text-dim);font-family:var(--font-ui);font-size:.84rem;padding:.9rem;cursor:pointer;transition:all var(--t);margin-top:.4rem;}
    .mk-add:hover{border-color:var(--gold);color:var(--gold);}
    textarea.form-input{min-height:90px;resize:vertical;font-family:var(--font-ui);line-height:1.6;}
    .mk-export-hint{margin-top:1.4rem;font-size:.74rem;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;line-height:1.8;}
    .mk-export-hint code{color:var(--starlight);background:var(--bg-deep);padding:.05rem .35rem;border-radius:3px;}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="mk-wrap">
  <header class="mk-head">
    <div class="mk-title">📝 시나리오 제작</div>
    <div class="mk-actions">
      <a class="mk-btn" href="index.html">◀ 라이브러리</a>
      <button class="mk-btn primary" id="mk-export">⬇ 추출 (JSON 다운로드)</button>
    </div>
  </header>

  <div class="mk-meta">
    <div class="form-group">
      <label class="form-label">시나리오 제목</label>
      <input type="text" class="form-input" id="mk-title" placeholder="예: 잊혀진 정거장"/>
    </div>
    <div class="mk-row2">
      <div class="form-group">
        <label class="form-label">작성자</label>
        <input type="text" class="form-input" id="mk-author" placeholder="닉네임"/>
      </div>
      <div class="form-group">
        <label class="form-label">파일명 <span class="hint">— 추출 시 사용</span></label>
        <input type="text" class="form-input" id="mk-file" placeholder="자동 생성"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">설명</label>
      <textarea class="form-input" id="mk-desc" placeholder="시나리오 개요를 적어주세요"></textarea>
    </div>
  </div>

  <div class="scn-cards" id="scn-cards"></div>
  <button class="mk-add" id="mk-add">＋ 장면 카드 추가</button>

  <div class="mk-export-hint" id="mk-hint">
    <b>워크플로우</b>: 작성 → <b>추출</b>로 JSON 다운로드 → 내려받은 파일을 저장소의 <code>scenarios/</code> 폴더에 넣기 → <code>scenarios/manifest.json</code> 배열에 파일명 추가 → 새로고침 → 게임 마스터 패널에서 선택해 띄우기.
  </div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let scenes = [{ title:'', body:'', image:null }];

/* 이미지 압축 (게임과 동일 규칙) */
function compressImage(file, maxDim=1400, quality=0.72){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth,h=img.naturalHeight;
      const sc=Math.min(1,maxDim/Math.max(w,h));
      w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const cx=cv.getContext('2d'); cx.fillStyle='#0b0b16'; cx.fillRect(0,0,w,h); cx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      let q=quality,out=cv.toDataURL('image/jpeg',q);
      while(out.length>900000&&q>0.4){ q-=0.12; out=cv.toDataURL('image/jpeg',q); }
      resolve(out);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('이미지 로드 실패')); };
    img.src=url;
  });
}

function render(){
  const box=document.getElementById('scn-cards');
  box.innerHTML = scenes.map((sc,i)=>`
    <div class="scn-card-edit" data-i="${i}">
      <div class="scn-card-top">
        <span class="scn-badge">${i+1}</span>
        <span style="font-family:var(--font-d);color:var(--text-dim);font-size:.8rem">장면 ${i+1}</span>
        <div class="scn-tools">
          <button class="scn-tool" data-act="up" ${i===0?'disabled':''}>▲</button>
          <button class="scn-tool" data-act="down" ${i===scenes.length-1?'disabled':''}>▼</button>
          <button class="scn-tool del" data-act="del">삭제</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">장면 제목</label>
        <input type="text" class="form-input" data-f="title" value="${esc(sc.title)}" placeholder="예: 도입 — 정거장 입구"/>
      </div>
      <div class="form-group">
        <label class="form-label">본문</label>
        <textarea class="form-input" data-f="body" placeholder="플레이어에게 보여줄 장면 묘사">${esc(sc.body)}</textarea>
      </div>
      <div class="mk-img-row">
        <label class="scn-tool">이미지 선택<input type="file" accept="image/*" data-f="image" hidden/></label>
        ${sc.image?`<img class="mk-img-prev" src="${sc.image}"/><button class="scn-tool del" data-act="imgdel">이미지 제거</button>`:'<span class="hint">선택 사항</span>'}
      </div>
    </div>`).join('');

  box.querySelectorAll('.scn-card-edit').forEach(card=>{
    const i=parseInt(card.dataset.i);
    card.querySelector('[data-f="title"]').addEventListener('input',e=>scenes[i].title=e.target.value);
    card.querySelector('[data-f="body"]').addEventListener('input',e=>scenes[i].body=e.target.value);
    card.querySelector('[data-f="image"]').addEventListener('change',async e=>{
      const f=e.target.files&&e.target.files[0]; if(!f) return;
      try{ scenes[i].image=await compressImage(f); render(); }catch(err){ alert(err.message); }
    });
    card.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
      const act=b.dataset.act;
      if(act==='del'){ if(scenes.length>1) scenes.splice(i,1); else { scenes[0]={title:'',body:'',image:null}; } }
      else if(act==='imgdel'){ scenes[i].image=null; }
      else if(act==='up'&&i>0){ [scenes[i-1],scenes[i]]=[scenes[i],scenes[i-1]]; }
      else if(act==='down'&&i<scenes.length-1){ [scenes[i+1],scenes[i]]=[scenes[i],scenes[i+1]]; }
      render();
    }));
  });
}

document.getElementById('mk-add').addEventListener('click',()=>{ scenes.push({title:'',body:'',image:null}); render(); });

function slugify(s){
  return (String(s||'scenario').trim().toLowerCase()
    .replace(/[^a-z0-9가-힣]+/g,'-').replace(/^-+|-+$/g,'')||'scenario');
}

document.getElementById('mk-export').addEventListener('click',()=>{
  const title=document.getElementById('mk-title').value.trim();
  if(!title){ alert('시나리오 제목을 입력하세요.'); return; }
  const cleanScenes=scenes
    .map(s=>({title:s.title.trim(),body:s.body.trim(),image:s.image||null}))
    .filter(s=>s.title||s.body||s.image);
  if(!cleanScenes.length){ alert('장면을 최소 1개 작성하세요.'); return; }
  const obj={ title, author:document.getElementById('mk-author').value.trim()||'익명',
              description:document.getElementById('mk-desc').value.trim(), scenes:cleanScenes };
  let fname=document.getElementById('mk-file').value.trim();
  if(!fname) fname=slugify(title)+'.json';
  if(!/\.json$/i.test(fname)) fname+='.json';

  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);

  document.getElementById('mk-hint').innerHTML =
    `✅ <b>${esc(fname)}</b> 다운로드 완료!<br/>① 이 파일을 저장소의 <code>scenarios/</code> 폴더에 넣으세요.<br/>② <code>scenarios/manifest.json</code> 을 열어 배열에 <code>"${esc(fname)}"</code> 를 추가하세요.<br/>③ 사이트를 새로고침하면 게임 마스터 패널의 시나리오 목록에 나타납니다.`;
});

render();

/* 배경 파티클 */
(function(){
  const c=document.getElementById('bg-canvas'); if(!c)return; const x=c.getContext('2d');
  let w,h,ps=[];
  function rs(){ w=c.width=innerWidth; h=c.height=innerHeight; ps=Array.from({length:60},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.4+.3,s:Math.random()*.3+.05})); }
  function loop(){ x.clearRect(0,0,w,h); x.fillStyle='rgba(201,168,76,.5)'; ps.forEach(p=>{ p.y-=p.s; if(p.y<0)p.y=h; x.globalAlpha=.4; x.beginPath(); x.arc(p.x,p.y,p.r,0,7); x.fill(); }); requestAnimationFrame(loop); }
  addEventListener('resize',rs); rs(); loop();
})();
</script>
</body>
</html>
